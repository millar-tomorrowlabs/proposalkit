<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <!--
    Proposl seal — hand-drawn placeholder
    ──────────────────────────────────────
    A deliberately imperfect `pl` ligature inside a slightly
    irregular circle. Meant to stand in until a real designer
    redraws this properly with a pen on an iPad or paper.

    Tricks used to fake hand-drawn in pure SVG:
      1. The circle is a cubic-bezier path with asymmetric control
         points, not a mathematical <circle>. Slightly wobbly.
      2. A small pen-lift gap at the top where the "pen" never
         quite closed the loop.
      3. The shared stem is drawn as two overlapping strokes at
         slightly different positions — the v2 "happy accident"
         that read as sketched.
      4. Small horizontal serifs at the top (l-cap) and bottom
         (p-foot + l-foot), drawn as short separate strokes like
         a pen tap.
      5. The p-bowl is a quadratic curve with asymmetric control
         points so it isn't perfectly round.
      6. All strokes use round caps and joins — pen ink, not
         CNC-cut steel.

    Colors: forest #2C4A3F on cream #FAF8F3.
  -->

  <rect width="200" height="200" fill="#FAF8F3"/>

  <g stroke="#2C4A3F" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Slightly irregular circle with a pen-lift gap near the top -->
    <path d="M 108 28.5
             C 146 30, 171 61, 172 99
             C 173 141, 139 171, 100 171
             C 59 172, 29 139, 28.5 100
             C 28 59, 61 30, 99 28"
          stroke-width="3.5"/>

    <!-- Shared stem: primary stroke -->
    <line x1="92" y1="42" x2="92" y2="158" stroke-width="6.5"/>
    <!-- Shared stem: secondary pass, slightly offset -->
    <line x1="93.5" y1="44" x2="93" y2="158" stroke-width="5"/>

    <!-- Top of the l: small flag serif across the stem top -->
    <line x1="86.5" y1="42.5" x2="99.5" y2="42" stroke-width="3"/>

    <!-- Bottom serif foot (p descender foot + l foot) -->
    <line x1="85" y1="158.5" x2="100" y2="158" stroke-width="3"/>

    <!-- The p's bowl, deliberately asymmetric -->
    <path d="M 93 85
             Q 134 82, 131 107
             Q 130 131, 92 130"
          stroke-width="6"/>

  </g>
</svg>
