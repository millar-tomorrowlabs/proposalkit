<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <!--
    Proposl seal — v1 (geometric proof-of-concept)
    ─────────────────────────────────────────────
    A thin circle seal containing a custom `pl` ligature
    where the p and l share a single vertical stem.

    This is a GEOMETRIC approximation, NOT the final mark.
    It uses simple geometric shapes instead of real Cormorant
    letterforms. Purpose: prove the concept and unblock visual
    iteration before handing off to proper design work.

    Color: #2C4A3F on #FAF8F3
  -->

  <!-- Cream background (for context; not part of the mark) -->
  <rect width="200" height="200" fill="#FAF8F3"/>

  <!-- Seal boundary: thin circle -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#2C4A3F" stroke-width="3"/>

  <!--
    The pl ligature
    ───────────────
    Construction, top to bottom:
      ascender-top:   y = 42  (top of l's stem)
      x-height:       y = 85  (where p's bowl attaches)
      baseline:       y = 130
      descender-bot:  y = 158 (bottom of p's descender)

    Shared stem is a single vertical line from ascender to descender.
  -->

  <!-- Shared vertical stem (p's descender = l's ascender) -->
  <line x1="92" y1="42" x2="92" y2="158"
        stroke="#2C4A3F" stroke-width="9"
        stroke-linecap="square"/>

  <!-- The p's bowl: attaches to the stem at x-height, curves right and back -->
  <path d="M 92 85
           Q 130 85, 130 107
           Q 130 130, 92 130"
        fill="none" stroke="#2C4A3F" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!--
    A faint dashed overlay showing the four horizontal guidelines.
    Remove before any final use. Kept here just to make the
    construction legible in exploration.
  -->
  <g opacity="0.12" stroke="#2C4A3F" stroke-width="0.5" stroke-dasharray="2 3">
    <line x1="50" y1="42" x2="150" y2="42"/>
    <line x1="50" y1="85" x2="150" y2="85"/>
    <line x1="50" y1="130" x2="150" y2="130"/>
    <line x1="50" y1="158" x2="150" y2="158"/>
  </g>
</svg>
